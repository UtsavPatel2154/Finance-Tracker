<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Join Us!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-image: url('bgimage.jpg');
            display: flex;
            justify-content: center;
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        .signup-container {
            background-color: #ffffff;
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .signup-container:hover {
            transform: scale(1.02);
        }
        
        h2 {
            margin-bottom: 1rem;
            font-size: 1.8rem;
            font-weight: 700;
            color: #0f9b8e;
        }
        
        p.subtext {
            font-size: 1rem;
            color: #555;
            margin-bottom: 1.5rem;
        }
        
        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }
        
        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.3rem;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="password"],
        input[type="date"],
        select {
            width: 100%;
            padding: 0.8rem;
            font-size: 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: all 0.3s ease;
            color: #333;
        }
        
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        input[type="password"]:focus,
        input[type="date"]:focus,
        select:focus {
            border-color: #0f9b8e;
            box-shadow: 0 0 8px rgba(15, 155, 142, 0.3);
        }
        
        input::placeholder {
            color: #aaa;
        }
        
        button {
            width: 100%;
            padding: 0.9rem;
            background-color: #0f9b8e;
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        
        button:hover {
            background-color: #087f73;
        }
        
        .signin-link {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #666;
        }
        
        .signin-link a {
            color: #0f9b8e;
            font-weight: bold;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .signin-link a:hover {
            color: #087f73;
        }
        /* Responsive Design */
        
        @media (max-width: 768px) {
            .signup-container {
                padding: 1.5rem;
                max-width: 90%;
            }
            h2 {
                font-size: 1.5rem;
            }
            button {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="signup-container">
        <h2>Create Your Account</h2>
        <!-- Replace your current <form> and script section with this updated one -->

            <form id="signupForm" action="signup.php" method="post" enctype="multipart/form-data" novalidate>
                <div class="input-group">
                    <label for="txtName">Name</label>
                    <input type="text" name="txtName" id="txtName" placeholder="Enter your first name" required>
                    <small class="error-msg" id="nameError"></small>
                </div>
            
                <div class="input-group">
                    <label for="txtEmail">Email</label>
                    <input type="email" name="txtEmail" id="txtEmail" placeholder="Enter your email" required autocomplete="off" inputmode="email">
                    <small class="error-msg" id="emailError"></small>
                </div>
            
                <div class="input-group">
                    <label for="txtPhoneNo">Phone Number</label>
                    <input type="tel" name="txtPhoneNo" id="txtPhoneNo" placeholder="Enter your phone number" pattern="[0-9]{10}" inputmode="numeric" required>
                    <small class="error-msg" id="phoneError"></small>
                </div>
            
                <div class="input-group">
                    <label for="rbtnGen">Gender</label>
                    <select name="rbtnGen" id="rbtnGen" required>
                        <option value="">Select your gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                    <small class="error-msg" id="genderError"></small>
                </div>
            
                <div class="input-group">
                    <label for="txtPass">Password</label>
                    <input type="password" id="txtPass" name="txtPass" placeholder="Create a strong password" required>
                    <small class="error-msg" id="passError"></small>
                </div>
            
                <div class="input-group">
                    <label for="txtConfirmPass">Confirm Password</label>
                    <input type="password" id="txtConfirmPass" name="txtConfirmPass" placeholder="Re-enter your password" required>
                    <small class="error-msg" id="confirmPassError"></small>
                </div>
            
                <button type="submit">Sign Up</button><br>
                <br><button onclick="window.location.href='welcome.html'">Back</button>
            </form>
            
            <script>
                const form = document.getElementById('signupForm');
                const name = document.getElementById('txtName');
                const email = document.getElementById('txtEmail');
                const phone = document.getElementById('txtPhoneNo');
                const gender = document.getElementById('rbtnGen');
                const password = document.getElementById('txtPass');
                const confirmPassword = document.getElementById('txtConfirmPass');
            
                const nameError = document.getElementById('nameError');
                const emailError = document.getElementById('emailError');
                const phoneError = document.getElementById('phoneError');
                const genderError = document.getElementById('genderError');
                const passError = document.getElementById('passError');
                const confirmPassError = document.getElementById('confirmPassError');
            
                function showError(element, message) {
                    element.textContent = message;
                    element.style.color = 'red';
                }
            
                function clearError(element) {
                    element.textContent = '';
                }
            
                function validateName() {
                    if (name.value.trim() === '') {
                        showError(nameError, 'Name is required.');
                        return false;
                    }
                    clearError(nameError);
                    return true;
                }
            
                function validateEmail() {
                    const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (email.value.trim() === '') {
                        showError(emailError, 'Email is required.');
                        return false;
                    } else if (!regex.test(email.value)) {
                        showError(emailError, 'Enter a valid email address.');
                        return false;
                    }
                    clearError(emailError);
                    return true;
                }

            
                function validatePhone() {
                    const phoneVal = phone.value.trim();
                    if (phoneVal === '') {
                        showError(phoneError, 'Phone number is required.');
                        return false;
                    } else if (!/^\d{10}$/.test(phoneVal)) {
                        showError(phoneError, 'Phone number must be 10 digits.');
                        return false;
                    }
                    clearError(phoneError);
                    return true;
                }
            
                function validateGender() {
                    if (gender.value === '') {
                        showError(genderError, 'Please select a gender.');
                        return false;
                    }
                    clearError(genderError);
                    return true;
                }
            
                function validatePassword() {
                    const val = password.value.trim();
                    const strongRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;
                    if (val === '') {
                        showError(passError, 'Password is required.');
                        return false;
                    } else if (!strongRegex.test(val)) {
                        showError(passError, 'Must contain 8+ chars, uppercase, lowercase, number, and special character.');
                        return false;
                    }
                    clearError(passError);
                    return true;
                }
            
                function validateConfirmPassword() {
                    if (confirmPassword.value.trim() === '') {
                        showError(confirmPassError, 'Confirm your password.');
                        return false;
                    } else if (password.value !== confirmPassword.value) {
                        showError(confirmPassError, 'Passwords do not match.');
                        return false;
                    }
                    clearError(confirmPassError);
                    return true;
                }
            
                form.addEventListener('submit', function (e) {
                    const valid =
                        validateName() &&
                        validateEmail() &&
                        validatePhone() &&
                        validateGender() &&
                        validatePassword() &&
                        validateConfirmPassword();
            
                    if (!valid) {
                        e.preventDefault(); // Stop form submission
                    }
                });
            
                // Optional: real-time validation on blur or input
                name.addEventListener('blur', validateName);
                email.addEventListener('blur', validateEmail);
                phone.addEventListener('input', () => {
                    phone.value = phone.value.replace(/\D/g, '');
                    validatePhone();
                });
                gender.addEventListener('change', validateGender);
                password.addEventListener('input', validatePassword);
                confirmPassword.addEventListener('input', validateConfirmPassword);
            </script>

    </div>
</body>

</html>
